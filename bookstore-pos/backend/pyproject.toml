[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [".venv", "alembic"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "W",      # pycodestyle warnings
    "B",      # flake8-bugbear
    "I",      # isort
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "S",      # flake8-bandit (security)
    "C4",     # flake8-comprehensions
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "T20",    # flake8-print
    "PTH",    # flake8-use-pathlib
]
ignore = [
    "B008",   # Do not perform function calls in argument defaults (FastAPI Depends)
    "S101",   # assert used (common in tests)
    "T201",   # print used (acceptable for logging in some cases)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]  # Allow assert and hardcoded passwords in tests
"alembic/*" = ["T201"]  # Allow print in migrations
