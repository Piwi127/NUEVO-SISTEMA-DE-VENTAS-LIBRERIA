[tool.isort]
profile = "black"
line_length = 120
src_paths = ["app", "tests"]
skip = [".venv", "alembic", "__pycache__", "*.pyc"]
known_first_party = "app"
known_third_party = ["fastapi", "sqlalchemy", "pydantic", "pytest"]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
