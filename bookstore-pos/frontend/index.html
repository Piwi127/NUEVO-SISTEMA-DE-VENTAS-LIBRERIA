<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookstore POS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Splash screen - se muestra mientras carga la aplicacion */
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #FBF8F2 0%, #F4F0E8 52%, #EDE4D4 100%);
        background-image:
          radial-gradient(circle at top left, rgba(19,41,61,0.08) 0%, rgba(19,41,61,0) 28%),
          radial-gradient(circle at top right, rgba(15,118,110,0.1) 0%, rgba(15,118,110,0) 34%);
        z-index: 9999;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash-screen .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        animation: pulse 2s ease-in-out infinite;
      }
      #splash-screen .title {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #13293D;
        margin-bottom: 8px;
      }
      #splash-screen .subtitle {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 0.875rem;
        color: #4B5F73;
      }
      #splash-screen .loading-bar {
        width: 200px;
        height: 4px;
        background: rgba(19, 41, 61, 0.1);
        border-radius: 2px;
        margin-top: 24px;
        overflow: hidden;
      }
      #splash-screen .loading-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #13293D, #0F766E);
        border-radius: 2px;
        animation: loading 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash-screen">
      <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="20" fill="#13293D"/>
        <path d="M30 35h40M30 50h35M30 65h30" stroke="#F4F0E8" stroke-width="6" stroke-linecap="round"/>
        <circle cx="75" cy="70" r="12" fill="#0F766E"/>
      </svg>
      <div class="title">Bookstore POS</div>
      <div class="subtitle">Cargando sistema...</div>
      <div class="loading-bar"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Ocultar splash screen cuando la app este lista
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 300);
          }
        }, 500);
      });
    </script>
  </body>
</html>
